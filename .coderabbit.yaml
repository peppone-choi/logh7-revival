# CodeRabbit configuration — https://docs.coderabbit.ai/reference/configuration
# Public repo, free tier. Review language: Korean.

language: ko-KR
early_access: false
enable_free_tier: true

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  auto_review:
    enabled: true

  # Everything is reviewed by default; these paths are excluded because they
  # are extracted/vendored/generated artifacts, not authored code:
  #   artifacts/**      - gitignored CD image mounts (also excluded via .gitignore)
  #   reference/**       - external reference repos, ported code is forbidden
  #                        (see CLAUDE.md "참고 레포 코드 이식" ban) — not our code
  #   .codegraph/**       - generated code-review-graph index
  #   docs/reference/**  - vendored official manual PDFs
  # server/**, docs/**, .ai/**, hooks/scripts (.claude/**, .codex/**,
  # scripts/**) are NOT excluded and remain reviewed.
  path_filters:
    - "!artifacts/**"
    - "!reference/**"
    - "!.codegraph/**"
    - "!docs/reference/**"
