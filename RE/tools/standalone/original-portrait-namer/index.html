<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LOGH VII 오리지널 캐릭터 포트레잇 네이밍</title>
<style>
  :root{--bg:#11131a;--panel:#1b1f2a;--card:#222735;--line:#323a4d;--fg:#e8ecf5;--mut:#9aa6bd;
        --acc:#5b8cff;--ok:#3ecf8e;--emp:#caa24a;--ali:#4aa3ca;--warn:#e0683c;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.45 "Segoe UI",system-ui,sans-serif}
  header{position:sticky;top:0;z-index:10;background:var(--panel);border-bottom:1px solid var(--line);
         padding:10px 16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
  header h1{font-size:15px;margin:0 8px 0 0;font-weight:700}
  header .sp{flex:1}
  input,select,button{background:var(--card);color:var(--fg);border:1px solid var(--line);
        border-radius:8px;padding:7px 10px;font-size:13px}
  input:focus,select:focus{outline:2px solid var(--acc);outline-offset:-1px}
  button{cursor:pointer}
  button:hover{border-color:var(--acc)}
  .seg button{border-radius:0;border-left:none}
  .seg button:first-child{border-radius:8px 0 0 8px;border-left:1px solid var(--line)}
  .seg button:last-child{border-radius:0 8px 8px 0}
  .seg button.on{background:var(--acc);border-color:var(--acc);color:#fff}
  .prog{min-width:190px}
  .bar{height:7px;background:var(--card);border-radius:6px;overflow:hidden;border:1px solid var(--line)}
  .bar>i{display:block;height:100%;background:var(--ok);width:0}
  .meta{color:var(--mut);font-size:12px}
  #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;padding:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px;
        display:flex;flex-direction:column;gap:7px}
  .card.named{border-color:#2f5a44}
  .pic{position:relative;display:flex;justify-content:center;align-items:center;background:#0c0e14;
       border-radius:8px;height:128px;overflow:hidden}
  .pic img{height:120px}
  .dup{position:absolute;top:6px;right:6px;background:#000a;border:1px solid var(--line);
       border-radius:20px;font-size:11px;padding:2px 8px;color:#ffd479}
  .row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .row .key{font-size:11px;color:var(--mut);font-family:Consolas,monospace}
  .tag{font-size:10px;padding:1px 6px;border-radius:6px;border:1px solid var(--line);color:var(--mut)}
  .tag.oem{color:var(--emp);border-color:#5a4a24}
  .tag.oam{color:var(--ali);border-color:#234a5a}
  /* every field is full width so the 진영 select (and others) never truncate */
  .card input,.card select{width:100%}
  .card .name{font-size:14px;font-weight:600}
  .card .ja,.card .note{font-size:12px}
  .card select{font-size:13px}
  .stat{font-size:11px;min-height:14px;color:var(--mut)}
  .stat.ok{color:var(--ok)} .stat.saving{color:var(--acc)} .stat.err{color:var(--warn)}
  .hide{display:none!important}
  .empty{padding:40px;text-align:center;color:var(--mut)}
</style>
</head>
<body>
<header>
  <h1>🪖 오리지널 캐릭터 포트레잇 네이밍</h1>
  <input id="q" type="search" placeholder="검색(이름/번호)…" style="width:180px">
  <span class="seg" id="atlasSeg">
    <button data-a="all" class="on">전체</button>
    <button data-a="oem">제국</button>
    <button data-a="oam">동맹</button>
    <button data-a="o">기타</button>
  </span>
  <span class="seg" id="stateSeg">
    <button data-s="all" class="on">모두</button>
    <button data-s="unnamed">미지정</button>
    <button data-s="named">지정됨</button>
    <button data-s="dups">중복만</button>
  </span>
  <span class="sp"></span>
  <span class="prog">
    <div class="meta"><b id="cnt">0</b> / <span id="tot">0</span> 얼굴 명명됨 ·
      <span id="imgmeta" class="meta"></span> · <span id="saved" class="meta">—</span></div>
    <div class="bar"><i id="barfill"></i></div>
  </span>
  <button id="backup" title="현재 상태를 타임스탬프 백업으로 저장">백업</button>
</header>

<datalist id="sug"></datalist>
<div id="grid"></div>
<div id="empty" class="empty hide">조건에 맞는 얼굴이 없습니다.</div>

<script>
const $ = s => document.querySelector(s);
let GROUPS=[], NAMES={}, SUG=[], TOTAL=0;
let atlasF="all", stateF="all", q="";
const timers = {};

async function load(){
  const m = await (await fetch("/api/manifest")).json();
  GROUPS=m.groups; NAMES=m.names||{}; SUG=m.suggestions||[]; TOTAL=GROUPS.length;
  $("#tot").textContent=TOTAL;
  $("#imgmeta").textContent = `중복 합쳐 ${m.totalImages}장 → ${TOTAL} 얼굴`;
  buildSuggest(); render(); updateProgress(m.namedCount, m.savedAt);
}

function buildSuggest(){
  const dl=$("#sug"); const seen=new Set();
  for(const s of SUG){ for(const v of [s.kr, s.ja]){
    if(v && !seen.has(v)){ seen.add(v);
      const o=document.createElement("option"); o.value=v;
      o.label = (v===s.kr ? s.ja : (s.kr||"")); dl.appendChild(o); } } }
}

function isNamed(id){ const e=NAMES[id]; return !!(e && (e.name||"").trim()); }

function passFilter(g){
  if(atlasF!=="all" && !g.atlases.includes(atlasF)) return false;
  const named=isNamed(g.id);
  if(stateF==="named" && !named) return false;
  if(stateF==="unnamed" && named) return false;
  if(stateF==="dups" && g.count<2) return false;
  if(q){ const e=NAMES[g.id]||{};
    const hay=(g.rep+" "+(e.name||"")+" "+(e.name_ja||"")).toLowerCase();
    if(!hay.includes(q)) return false; }
  return true;
}

function render(){
  const grid=$("#grid"); grid.innerHTML=""; let shown=0;
  for(const g of GROUPS){
    if(!passFilter(g)) continue; shown++;
    const e=NAMES[g.id]||{};
    const tags=g.atlases.map(a=>`<span class="tag ${a}">${a}</span>`).join("");
    const dup = g.count>1 ? `<span class="dup">×${g.count}</span>` : "";
    const card=document.createElement("div");
    card.className="card"+(isNamed(g.id)?" named":""); card.dataset.id=g.id;
    card.innerHTML=`
      <div class="pic"><img loading="lazy" src="${g.url}" alt="${g.rep}">${dup}</div>
      <div class="row"><span class="key">${g.rep}</span>${tags}</div>
      <input class="name" type="text" list="sug" placeholder="이름(한글)…" value="${esc(e.name)}">
      <select class="fac">
        <option value="">진영 선택</option>
        <option value="empire">제국 (Empire)</option>
        <option value="alliance">동맹 (Alliance)</option>
        <option value="other">기타 / 미상</option>
      </select>
      <input class="ja" type="text" placeholder="일본어 원명(선택)" value="${esc(e.name_ja)}">
      <input class="note" type="text" placeholder="메모(선택)" value="${esc(e.note)}">
      <div class="stat"></div>`;
    card.querySelector(".fac").value = e.faction || g.defaultFaction || "";
    for(const sel of [".name",".ja",".fac",".note"]){
      const el=card.querySelector(sel);
      el.addEventListener(sel===".fac"?"change":"input", ()=>queueSave(g.id, card));
      if(sel===".name") el.addEventListener("keydown", ev=>{ if(ev.key==="Enter") focusNext(card); });
    }
    grid.appendChild(card);
  }
  $("#empty").classList.toggle("hide", shown>0);
}

function focusNext(card){
  let n=card.nextElementSibling;
  while(n && n.classList.contains("hide")) n=n.nextElementSibling;
  if(n){ const inp=n.querySelector(".name"); inp && inp.focus(); }
}

function gather(card){
  return { id:card.dataset.id,
    name:card.querySelector(".name").value.trim(),
    name_ja:card.querySelector(".ja").value.trim(),
    faction:card.querySelector(".fac").value,
    note:card.querySelector(".note").value.trim() };
}

function queueSave(id, card){
  const stat=card.querySelector(".stat"); stat.className="stat saving"; stat.textContent="저장 중…";
  clearTimeout(timers[id]); timers[id]=setTimeout(()=>doSave(id,card), 300);
}

async function doSave(id, card){
  const payload=gather(card); const stat=card.querySelector(".stat");
  try{
    const r=await (await fetch("/api/save",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify(payload)})).json();
    if(!r.ok) throw new Error(r.error||"오류");
    NAMES[id]={name:payload.name,name_ja:payload.name_ja,faction:payload.faction,note:payload.note};
    card.classList.toggle("named", !!payload.name);
    stat.className="stat ok"; stat.textContent="저장됨 "+r.savedAt.split(" ")[1];
    updateProgress(r.namedCount, r.savedAt);
  }catch(err){ stat.className="stat err"; stat.textContent="저장 실패 — 다시 입력하면 재시도"; }
}

function updateProgress(cnt, savedAt){
  if(cnt!=null){ $("#cnt").textContent=cnt; $("#barfill").style.width=(TOTAL?100*cnt/TOTAL:0)+"%"; }
  if(savedAt) $("#saved").textContent="마지막 저장 "+savedAt.split(" ")[1];
}

function esc(s){ return (s==null?"":String(s)).replace(/"/g,"&quot;").replace(/</g,"&lt;"); }

$("#q").addEventListener("input", e=>{ q=e.target.value.trim().toLowerCase(); render(); });
$("#atlasSeg").addEventListener("click", e=>{ const b=e.target.closest("button"); if(!b)return;
  atlasF=b.dataset.a; [...e.currentTarget.children].forEach(x=>x.classList.toggle("on",x===b)); render(); });
$("#stateSeg").addEventListener("click", e=>{ const b=e.target.closest("button"); if(!b)return;
  stateF=b.dataset.s; [...e.currentTarget.children].forEach(x=>x.classList.toggle("on",x===b)); render(); });
$("#backup").addEventListener("click", async()=>{
  const r=await (await fetch("/api/backup",{method:"POST"})).json();
  $("#backup").textContent = r.ok ? "백업됨 ✓" : "백업 실패";
  setTimeout(()=>$("#backup").textContent="백업", 2000);
});

load();
</script>
</body>
</html>
